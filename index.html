<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌺🌴YUKINO🌴🌺 のリアル沖縄リゾート電卓</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: manipulation;
    }

    body {
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.25) 0%, rgba(0, 40, 70, 0.35) 100%);
      pointer-events: none;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 16px;
      width: 100%;
      max-width: 380px;
      max-height: 98vh;
      box-shadow: 0 25px 50px rgba(0, 30, 50, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.8);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
      overflow: hidden;
    }

    .calculator::after {
      content: "";
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 85%;
      height: 60%;
      background: url('https://images.unsplash.com/photo-1550950158-d0d960dff51b?q=80&w=800&auto=format&fit=crop') no-repeat center center;
      background-size: contain;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .header-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #004d61;
      margin-top: 2px;
      margin-bottom: 4px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    
    .header-title .name-stylish {
      font-family: 'Brush Script MT', 'Lucida Handwriting', 'Segoe Script', 'Segoe Print', cursive;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin: 0 6px;
      line-height: 1.2;
      padding-top: 2px;
      padding-bottom: 2px;
      background: linear-gradient(180deg, #fff3b0 0%, #ffd700 40%, #ff8c00 80%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.7))
              drop-shadow(0px 0px 2px rgba(255, 255, 255, 1));
      display: inline-block;
    }

    .display-container {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(180, 235, 255, 0.35)), 
                  url('https://images.unsplash.com/photo-1512100356356-de1b84283e18?q=80&w=800&auto=format&fit=crop') no-repeat center center;
      background-size: cover;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      padding: 6px 12px;
      margin-bottom: 6px;
      box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.8), 0 4px 15px rgba(0, 131, 176, 0.25);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .datetime {
      font-size: 0.7rem;
      color: #004d61;
      font-weight: bold;
      text-align: right;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .formula-screen {
      font-size: 0.85rem;
      color: #b78103;
      text-align: right;
      height: 18px;
      line-height: 18px;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .screen {
      width: 100%;
      height: 36px;
      background: transparent;
      border: none;
      outline: none;
      text-align: right;
      font-size: 1.9rem;
      font-weight: bold;
      color: #00334e;
      word-wrap: break-word;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 255, 255, 0.6);
    }

    .discount-toggle-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff5e62, #ff9966);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 5px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 6px;
      box-shadow: 0 4px 10px rgba(255, 94, 98, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.6);
      transition: all 0.1s;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 2;
    }

    .discount-toggle-btn:active {
      transform: translateY(2px);
    }

    .discount-wrapper {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease-out;
      margin-bottom: 4px;
      position: relative;
      z-index: 2;
    }

    .discount-wrapper.open {
      max-height: 100px;
    }

    .discount-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      padding: 2px 0;
    }

    .btn-discount {
      background-color: rgba(255, 255, 255, 0.9);
      color: #e64a19;
      border: 1px solid rgba(255, 112, 67, 0.5);
      padding: 5px 0;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.1s;
    }

    .btn-discount:active {
      transform: translateY(2px);
      background-color: #ff7043;
      color: #fff;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      position: relative;
      z-index: 2;
    }

    button.btn {
      height: 44px;
      border-radius: 12px;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-shisa {
      background: linear-gradient(135deg, #d84315, #ff7043);
      color: #ffffff !important;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 3px 6px rgba(183, 28, 28, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.5);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2px 0;
    }

    .btn-shisa .shisa-icon {
      font-size: 0.9rem;
      line-height: 1;
      margin-bottom: 1px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }

    .btn-shisa .shisa-text {
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .btn-shisa:active {
      transform: translateY(2px);
    }

    .num {
      background-color: rgba(255, 255, 255, 0.88);
      color: #1a365d;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 1);
    }
    .num:active {
      transform: translateY(2px);
      background-color: rgba(240, 248, 255, 0.95);
    }

    .op {
      background: linear-gradient(135deg, #0083b0, #00b4db);
      color: #ffffff;
      font-size: 1.5rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(0, 131, 176, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .op:active {
      transform: translateY(2px);
    }

    .equal {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: #ffffff;
      font-size: 1.7rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(255, 65, 108, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .equal:active {
      transform: translateY(2px);
    }

    .clear {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #ffffff;
      font-size: 1.2rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(247, 151, 30, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .clear:active {
      transform: translateY(2px);
    }

    .history-btn, .memo-btn {
      background-color: rgba(224, 242, 241, 0.95);
      color: #00695c;
      border: 1px solid rgba(255, 255, 255, 0.8);
      font-size: 0.75rem !important;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }
    .history-btn:active, .memo-btn:active {
      transform: translateY(2px);
    }

    .modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 12px;
      z-index: 10;
      box-sizing: border-box;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      color: #00695c;
      margin-bottom: 8px;
      border-bottom: 2px solid #80cbc4;
      padding-bottom: 4px;
      font-size: 0.9rem;
    }

    .modal-close {
      background: #ff416c;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .modal-body {
      overflow-y: auto;
      flex-grow: 1;
    }

    .history-list {
      list-style: none;
    }

    .history-item {
      padding: 8px 0;
      border-bottom: 1px dashed #b2dfdb;
      text-align: right;
      color: #263238;
      font-size: 0.85rem;
    }

    .memo-form {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      width: 100%;
    }

    .memo-input-name {
      flex: 2;
      min-width: 0;
      padding: 5px 6px;
      border: 1px solid #b2dfdb;
      border-radius: 8px;
      font-size: 0.75rem;
      outline: none;
    }

    .memo-input-price {
      flex: 1.5;
      min-width: 0;
      padding: 5px 6px;
      border: 1px solid #b2dfdb;
      border-radius: 8px;
      font-size: 0.75rem;
      outline: none;
      text-align: right;
    }

    .memo-add-btn {
      flex-shrink: 0;
      background: #0083b0;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      cursor: pointer;
    }

    .memo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .memo-table th {
      border-bottom: 2px solid #b2dfdb;
      padding: 4px;
      color: #00695c;
      text-align: left;
    }

    .memo-table td {
      border-bottom: 1px solid #e0f2f1;
      padding: 5px 4px;
      color: #37474f;
    }

    .memo-del-btn {
      color: #e53935;
      cursor: pointer;
      font-weight: bold;
      border: none;
      background: none;
    }

    .memo-total {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 2px solid #00695c;
      font-weight: bold;
      color: #004d40;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
  </style>
</head>
