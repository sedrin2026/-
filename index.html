<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌺🌴YUKINO🌴🌺 のリアル沖縄リゾート電卓</title>
  <!-- 優雅でクラシカルな筆記体フォント（Great Vibes）の読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 画面全体を固定してスライド・スクロールを完全に防ぐ */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: manipulation;
    }

    /* 全体の背景：沖縄の美しい海岸・砂浜の写真 */
    body {
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      position: relative;
    }

    /* 南国の空気感を演出するフィルター */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.25) 0%, rgba(0, 40, 70, 0.35) 100%);
      pointer-events: none;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 18px;
      width: 100%;
      max-width: 380px;
      max-height: 98vh;
      box-shadow: 0 25px 50px rgba(0, 30, 50, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.8);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
      overflow: hidden; /* 薄いハイビスカスのハミ出しを防止 */
    }

    /* 電卓本体に大きくうっすら配置する実写ハイビスカス */
    .calculator::after {
      content: "";
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 85%;
      height: 60%;
      background: url('https://images.unsplash.com/photo-1550950158-d0d960dff51b?q=80&w=800&auto=format&fit=crop') no-repeat center center;
      background-size: contain;
      opacity: 0.18; /* うっすら見せるための透明度 */
      pointer-events: none; /* ボタン操作を邪魔しない */
      z-index: 0;
    }

    /* ヘッダー＆ハッキリ見えるリアルゴールドYUKINOロゴ */
    .header-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #004d61;
      margin-bottom: 4px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    
    .header-title .name-stylish {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 0 4px;
      line-height: 1;
      background: linear-gradient(180deg, #ffd700 0%, #b8860b 45%, #d4af37 70%, #8b6508 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 2px 3px rgba(80, 50, 0, 0.6))
              drop-shadow(0px 0px 1px rgba(255, 255, 255, 0.8));
    }

    /* 明るくなったディスプレイ背景 */
    .display-container {
      /* 明るめのエメラルドグリーンリゾート写真に変更 */
      background: linear-gradient(rgba(0, 80, 100, 0.15), rgba(0, 40, 60, 0.35)), 
                  url('https://images.unsplash.com/photo-1512100356356-de1b84283e18?q=80&w=800&auto=format&fit=crop') no-repeat center center;
      background-size: cover;
      border: 2px solid rgba(0, 229, 255, 0.7);
      border-radius: 16px;
      padding: 8px 12px;
      margin-bottom: 8px;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 15px rgba(0, 180, 219, 0.4);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .datetime {
      font-size: 0.75rem;
      color: #e0f7fa;
      font-weight: bold;
      text-align: right;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .screen {
      width: 100%;
      height: 48px;
      background: transparent;
      border: none;
      outline: none;
      text-align: right;
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffffff;
      word-wrap: break-word;
      /* 明るい背景でも文字がはっきり読める影 */
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8), 0 2px 4px rgba(0, 0, 0, 0.9);
    }

    /* 割引スライドメニュー (ハイビスカス・サンセット調) */
    .discount-toggle-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff5e62, #ff9966);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 6px;
      box-shadow: 0 4px 10px rgba(255, 94, 98, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.6);
      transition: all 0.1s;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 2;
    }

    .discount-toggle-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 3px rgba(255, 94, 98, 0.4);
    }

    .discount-wrapper {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease-out;
      margin-bottom: 4px;
      position: relative;
      z-index: 2;
    }

    .discount-wrapper.open {
      max-height: 100px;
    }

    .discount-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      padding: 2px 0;
    }

    .btn-discount {
      background-color: rgba(255, 255, 255, 0.9);
      color: #e64a19;
      border: 1px solid rgba(255, 112, 67, 0.5);
      padding: 5px 0;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.1s;
    }

    .btn-discount:active {
      transform: translateY(2px);
      background-color: #ff7043;
      color: #fff;
    }

    /* キーパッド & ガラス質感ボタン */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      position: relative;
      z-index: 2;
    }

    button.btn {
      height: 46px;
      border-radius: 12px;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s;
    }

    /* 数字ボタン (半透明ピュアホワイト・ガラス風) */
    .num {
      background-color: rgba(255, 255, 255, 0.88);
      color: #1a365d;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 1);
    }
    .num:active {
      transform: translateY(2px);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      background-color: rgba(240, 248, 255, 0.95);
    }

    /* 演算子ボタン (ディープ・ケラマブルー) */
    .op {
      background: linear-gradient(135deg, #0083b0, #00b4db);
      color: #ffffff;
      font-size: 1.6rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(0, 131, 176, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .op:active {
      transform: translateY(2px);
      box-shadow: 0 1px 3px rgba(0, 131, 176, 0.4);
    }

    /* イコールボタン (ハイビスカス・レッド) */
    .equal {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: #ffffff;
      font-size: 1.8rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(255, 65, 108, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .equal:active {
      transform: translateY(2px);
      box-shadow: 0 1px 3px rgba(255, 65, 108, 0.4);
    }

    /* メモリーボタン */
    .mem {
      background-color: rgba(224, 242, 241, 0.88);
      color: #00695c;
      font-size: 0.9rem !important;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .mem:active {
      transform: translateY(2px);
    }

    /* クリア・削除ボタン (サンセット・オレンジ) */
    .clear {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #ffffff;
      font-size: 1.3rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 3px 8px rgba(247, 151, 30, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
    }
    .clear:active {
      transform: translateY(2px);
      box-shadow: 0 1px 3px rgba(247, 151, 30, 0.4);
    }

    /* 履歴ボタン */
    .history-btn {
      background-color: rgba(224, 242, 241, 0.88);
      color: #00695c;
      border: 1px solid rgba(255, 255, 255, 0.6);
      font-size: 0.8rem !important;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .history-btn:active {
      transform: translateY(2px);
    }

    /* 履歴モーダル */
    .modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 18px;
      z-index: 10;
      box-sizing: border-box;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      color: #00695c;
      margin-bottom: 12px;
      border-bottom: 2px solid #80cbc4;
      padding-bottom: 6px;
    }

    .modal-close {
      background: #ff416c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .history-list {
      list-style: none;
      overflow-y: auto;
      flex-grow: 1;
    }

    .history-item {
      padding: 8px 0;
      border-bottom: 1px dashed #b2dfdb;
      text-align: right;
      color: #263238;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="header-title">🌺🌴<span class="name-stylish">Yukino</span>🌴🌺</div>

    <div class="display-container">
      <div class="datetime" id="datetime">----/--/-- (-) --:--:--</div>
      <input type="text" class="screen" id="screen" value="0" readonly>
    </div>

    <!-- 割引スライドメニュー -->
    <button class="discount-toggle-btn" onclick="toggleDiscount()">🌺 リゾート割引メニュー (1〜8割 / OFF) ▼</button>
    <div class="discount-wrapper" id="discountWrapper">
      <div class="discount-grid">
        <button class="btn-discount" onclick="applyDiscount(0.1)">1割/10%</button>
        <button class="btn-discount" onclick="applyDiscount(0.2)">2割/20%</button>
        <button class="btn-discount" onclick="applyDiscount(0.3)">3割/30%</button>
        <button class="btn-discount" onclick="applyDiscount(0.4)">4割/40%</button>
        <button class="btn-discount" onclick="applyDiscount(0.5)">5割/50%</button>
        <button class="btn-discount" onclick="applyDiscount(0.6)">6割/60%</button>
        <button class="btn-discount" onclick="applyDiscount(0.7)">7割/70%</button>
        <button class="btn-discount" onclick="applyDiscount(0.8)">8割/80%</button>
      </div>
    </div>

    <div class="keypad">
      <!-- メモリーキー -->
      <button class="btn mem" onclick="memoryClear()">mc</button>
      <button class="btn mem" onclick="memoryAdd()">m+</button>
      <button class="btn mem" onclick="memorySub()">m-</button>
      <button class="btn mem" onclick="memoryRecall()">mr</button>

      <!-- 機能キー & 演算子 -->
      <button class="btn clear" onclick="clearScreen()">C</button>
      <button class="btn history-btn" onclick="toggleHistory()">📜 履歴</button>
      <button class="btn op" onclick="appendOp('÷')">÷</button>
      <button class="btn op" onclick="appendOp('×')">×</button>

      <!-- 数字キー 7 8 9 - -->
      <button class="btn num" onclick="appendNum('7')">7</button>
      <button class="btn num" onclick="appendNum('8')">8</button>
      <button class="btn num" onclick="appendNum('9')">9</button>
      <button class="btn op" onclick="appendOp('-')">-</button>

      <!-- 数字キー 4 5 6 + -->
      <button class="btn num" onclick="appendNum('4')">4</button>
      <button class="btn num" onclick="appendNum('5')">5</button>
      <button class="btn num" onclick="appendNum('6')">6</button>
      <button class="btn op" onclick="appendOp('+')">+</button>

      <!-- 数字キー 1 2 3 = -->
      <button class="btn num" onclick="appendNum('1')">1</button>
      <button class="btn num" onclick="appendNum('2')">2</button>
      <button class="btn num" onclick="appendNum('3')">3</button>
      <button class="btn equal" onclick="calculate()">=</button>

      <!-- 最下段 0 00 . % DEL -->
      <button class="btn num" onclick="appendNum('0')">0</button>
      <button class="btn num" onclick="appendNum('00')">00</button>
      <button class="btn num" onclick="appendNum('.')">.</button>
      <button class="btn op" onclick="appendPercent()">%</button>
      <button class="btn clear" onclick="deleteChar()">⌫</button>
    </div>

    <!-- 履歴モーダル -->
    <div class="modal" id="historyModal">
      <div class="modal-header">
        <span>📜 計算履歴 (最新10件)</span>
        <button class="modal-close" onclick="toggleHistory()">閉じる</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-item">History is empty</li>
      </ul>
    </div>
  </div>

  <script>
    // 時計機能
    function updateClock() {
      const now = new Date();
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const date = String(now.getDate()).padStart(2, '0');
      const day = days[now.getDay()];
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('datetime').innerText = `${year}/${month}/${date} (${day}) ${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 電卓状態
    let currentInput = "0";
    let expression = "";
    let isNewCalculation = false;
    let memoryValue = 0;
    let history = [];

    const screen = document.getElementById('screen');

    function updateScreen(val) {
      screen.value = val;
    }

    function appendNum(num) {
      if (currentInput === "0" || isNewCalculation) {
        currentInput = num;
        isNewCalculation = false;
      } else {
        currentInput += num;
      }
      updateScreen(currentInput);
    }

    function appendOp(op) {
      if (isNewCalculation) isNewCalculation = false;
      expression += currentInput + " " + op + " ";
      currentInput = "0";
    }

    function deleteChar() {
      if (isNewCalculation) return;
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = "0";
      }
      updateScreen(currentInput);
    }

    function appendPercent() {
      let val = parseFloat(currentInput);
      if (isNaN(val)) return;
      currentInput = String(val / 100);
      updateScreen(currentInput);
    }

    function clearScreen() {
      currentInput = "0";
      expression = "";
      updateScreen("0");
    }

    function calculate() {
      if (!expression && !currentInput) return;
      let fullExpr = expression + currentInput;
      let evalExpr = fullExpr.replace(/×/g, '*').replace(/÷/g, '/');

      try {
        let result = eval(evalExpr);
        result = Math.round(result * 100000000) / 100000000;
        addHistory(`${fullExpr} = ${result}`);
        currentInput = String(result);
        expression = "";
        isNewCalculation = true;
        updateScreen(currentInput);
      } catch (e) {
        updateScreen("Error");
        currentInput = "0";
        expression = "";
      }
    }

    // 割引機能
    function toggleDiscount() {
      const wrapper = document.getElementById('discountWrapper');
      wrapper.classList.toggle('open');
    }

    function applyDiscount(rate) {
      let val = parseFloat(currentInput);
      if (isNaN(val) || val === 0) return;

      let discountedCalc = val * (1 - rate);
      discountedCalc = Math.round(discountedCalc);
      let percentText = Math.round(rate * 100) + "%OFF";

      addHistory(`${val} の ${percentText} = ${discountedCalc}`);
      currentInput = String(discountedCalc);
      isNewCalculation = true;
      updateScreen(currentInput);
    }

    // メモリー機能
    function memoryClear() { memoryValue = 0; }
    function memoryAdd() { memoryValue += parseFloat(currentInput) || 0; isNewCalculation = true; }
    function memorySub() { memoryValue -= parseFloat(currentInput) || 0; isNewCalculation = true; }
    function memoryRecall() { currentInput = String(memoryValue); updateScreen(currentInput); isNewCalculation = true; }

    // 履歴管理
    function addHistory(item) {
      history.unshift(item);
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<li class="history-item">History is empty</li>';
        return;
      }
      list.innerHTML = history.map(h => `<li class="history-item">${h}</li>`).join('');
    }

    function toggleHistory() {
      const modal = document.getElementById('historyModal');
      modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
  </script>
</body>
</html>
