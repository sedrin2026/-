<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌺🌴YUKINO🌴🌺 の沖縄リゾート電卓</title>
  <!-- おしゃれなフォント（Pacifico）の読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 画面全体を固定してスライド・スクロールを完全に防ぐ */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: manipulation;
    }

    /* 沖縄の美しい海（エメラルド〜ディープブルー）をイメージした背景 */
    body {
      background: linear-gradient(135deg, #007791 0%, #00a8b5 40%, #00344d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      position: relative;
    }

    /* 波や砂浜のきらめきを表現する淡い光の演出 */
    body::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 60%);
      pointer-events: none;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 16px;
      width: 100%;
      max-width: 380px;
      max-height: 98vh;
      box-shadow: 0 20px 40px rgba(0, 40, 60, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.6);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }

    /* ヘッダー＆ゴールドに輝くYUKINOロゴ */
    .header-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #00667a;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
    }
    
    .header-title .name-stylish {
      font-family: 'Pacifico', cursive;
      font-size: 1.6rem;
      letter-spacing: 1.5px;
      margin: 0 4px;
      /* 黄金のゴールドグラデーション */
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      /* 立体的な輝きの影 */
      filter: drop-shadow(1px 1px 1px rgba(100, 70, 0, 0.3));
    }

    /* ラグジュアリー・リゾートなディスプレイ */
    .display-container {
      background-color: #0b252b;
      border: 2px solid #205460;
      border-radius: 16px;
      padding: 8px 12px;
      margin-bottom: 8px;
      box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.6), 0 0 12px rgba(0, 168, 181, 0.3);
    }

    .datetime {
      font-size: 0.75rem;
      color: #70b3be;
      font-weight: bold;
      text-align: right;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }

    .screen {
      width: 100%;
      height: 48px;
      background: transparent;
      border: none;
      outline: none;
      text-align: right;
      font-size: 2.2rem;
      font-weight: bold;
      color: #e6ffff;
      word-wrap: break-word;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }

    /* 割引スライドメニュー (サンゴ礁・リゾート調) */
    .discount-toggle-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff7e67, #e85a4f);
      color: #ffffff;
      border: 1px solid #ff9a8a;
      border-radius: 12px;
      padding: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 6px;
      box-shadow: 0 3px 0 #b53a2f;
      transition: all 0.1s;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }

    .discount-toggle-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #b53a2f;
    }

    .discount-wrapper {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease-out;
      margin-bottom: 4px;
    }

    .discount-wrapper.open {
      max-height: 100px;
    }

    .discount-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      padding: 2px 0;
    }

    .btn-discount {
      background-color: #ffffff;
      color: #e85a4f;
      border: 1.5px solid #ffab9d;
      padding: 5px 0;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 0 #f0d0cc;
      transition: all 0.1s;
    }

    .btn-discount:active {
      transform: translateY(2px);
      box-shadow: 0 0 0 #f0d0cc;
      background-color: #ffab9d;
      color: #fff;
    }

    /* キーパッド & ぷっくり立体ボタン */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    button.btn {
      height: 46px;
      border-radius: 12px;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s;
    }

    /* 数字ボタン (サンドホワイト＆上品な影) */
    .num {
      background-color: #fcfbf9;
      color: #2c3e50;
      border: 1px solid #e0ded9;
      box-shadow: 0 3px 0 #d4d0c7;
    }
    .num:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #d4d0c7;
      background-color: #f4f1ea;
    }

    /* 演算子ボタン (エメラルドオーシャンカラー) */
    .op {
      background-color: #009688;
      color: #ffffff;
      font-size: 1.6rem !important;
      border: 1px solid #26a69a;
      box-shadow: 0 3px 0 #00695c;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }
    .op:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #00695c;
    }

    /* イコールボタン (ハイビスカス・コーラルレッド) */
    .equal {
      background: linear-gradient(135deg, #ff5252, #e53935);
      color: #ffffff;
      font-size: 1.8rem !important;
      border: 1px solid #ff8a80;
      box-shadow: 0 3px 0 #b71c1c;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }
    .equal:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #b71c1c;
    }

    /* メモリーボタン */
    .mem {
      background-color: #e0f2f1;
      color: #00796b;
      font-size: 0.9rem !important;
      border: 1px solid #b2dfdb;
      box-shadow: 0 3px 0 #80cbc4;
    }
    .mem:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #80cbc4;
    }

    /* クリア・削除ボタン (サンセットオレンジ) */
    .clear {
      background-color: #ff7043;
      color: #ffffff;
      font-size: 1.3rem !important;
      border: 1px solid #ff8a65;
      box-shadow: 0 3px 0 #d84315;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }
    .clear:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #d84315;
    }

    /* 履歴ボタン */
    .history-btn {
      background-color: #e0f2f1;
      color: #00796b;
      border: 1px solid #b2dfdb;
      font-size: 0.8rem !important;
      box-shadow: 0 3px 0 #80cbc4;
    }
    .history-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #80cbc4;
    }

    /* 履歴モーダル */
    .modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 16px;
      z-index: 10;
      box-sizing: border-box;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      color: #00796b;
      margin-bottom: 12px;
      border-bottom: 2px solid #b2dfdb;
      padding-bottom: 6px;
    }

    .modal-close {
      background: #ff7043;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .history-list {
      list-style: none;
      overflow-y: auto;
      flex-grow: 1;
    }

    .history-item {
      padding: 8px 0;
      border-bottom: 1px dashed #b2dfdb;
      text-align: right;
      color: #37474f;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="header-title">🌺🌴<span class="name-stylish">YUKINO</span>🌴🌺</div>

    <div class="display-container">
      <div class="datetime" id="datetime">----/--/-- (-) --:--:--</div>
      <input type="text" class="screen" id="screen" value="0" readonly>
    </div>

    <!-- 割引スライドメニュー -->
    <button class="discount-toggle-btn" onclick="toggleDiscount()">🌺 リゾート割引メニュー (1〜8割 / OFF) ▼</button>
    <div class="discount-wrapper" id="discountWrapper">
      <div class="discount-grid">
        <button class="btn-discount" onclick="applyDiscount(0.1)">1割/10%</button>
        <button class="btn-discount" onclick="applyDiscount(0.2)">2割/20%</button>
        <button class="btn-discount" onclick="applyDiscount(0.3)">3割/30%</button>
        <button class="btn-discount" onclick="applyDiscount(0.4)">4割/40%</button>
        <button class="btn-discount" onclick="applyDiscount(0.5)">5割/50%</button>
        <button class="btn-discount" onclick="applyDiscount(0.6)">6割/60%</button>
        <button class="btn-discount" onclick="applyDiscount(0.7)">7割/70%</button>
        <button class="btn-discount" onclick="applyDiscount(0.8)">8割/80%</button>
      </div>
    </div>

    <div class="keypad">
      <!-- メモリーキー -->
      <button class="btn mem" onclick="memoryClear()">mc</button>
      <button class="btn mem" onclick="memoryAdd()">m+</button>
      <button class="btn mem" onclick="memorySub()">m-</button>
      <button class="btn mem" onclick="memoryRecall()">mr</button>

      <!-- 機能キー & 演算子 -->
      <button class="btn clear" onclick="clearScreen()">C</button>
      <button class="btn history-btn" onclick="toggleHistory()">📜 履歴</button>
      <button class="btn op" onclick="appendOp('÷')">÷</button>
      <button class="btn op" onclick="appendOp('×')">×</button>

      <!-- 数字キー 7 8 9 - -->
      <button class="btn num" onclick="appendNum('7')">7</button>
      <button class="btn num" onclick="appendNum('8')">8</button>
      <button class="btn num" onclick="appendNum('9')">9</button>
      <button class="btn op" onclick="appendOp('-')">-</button>

      <!-- 数字キー 4 5 6 + -->
      <button class="btn num" onclick="appendNum('4')">4</button>
      <button class="btn num" onclick="appendNum('5')">5</button>
      <button class="btn num" onclick="appendNum('6')">6</button>
      <button class="btn op" onclick="appendOp('+')">+</button>

      <!-- 数字キー 1 2 3 = -->
      <button class="btn num" onclick="appendNum('1')">1</button>
      <button class="btn num" onclick="appendNum('2')">2</button>
      <button class="btn num" onclick="appendNum('3')">3</button>
      <button class="btn equal" onclick="calculate()">=</button>

      <!-- 最下段 0 00 . % DEL -->
      <button class="btn num" onclick="appendNum('0')">0</button>
      <button class="btn num" onclick="appendNum('00')">00</button>
      <button class="btn num" onclick="appendNum('.')">.</button>
      <button class="btn op" onclick="appendPercent()">%</button>
      <button class="btn clear" onclick="deleteChar()">⌫</button>
    </div>

    <!-- 履歴モーダル -->
    <div class="modal" id="historyModal">
      <div class="modal-header">
        <span>📜 計算履歴 (最新10件)</span>
        <button class="modal-close" onclick="toggleHistory()">閉じる</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-item">履歴はありません</li>
      </ul>
    </div>
  </div>

  <script>
    // 時計機能
    function updateClock() {
      const now = new Date();
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const date = String(now.getDate()).padStart(2, '0');
      const day = days[now.getDay()];
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('datetime').innerText = `${year}/${month}/${date} (${day}) ${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 電卓状態
    let currentInput = "0";
    let expression = "";
    let isNewCalculation = false;
    let memoryValue = 0;
    let history = [];

    const screen = document.getElementById('screen');

    function updateScreen(val) {
      screen.value = val;
    }

    function appendNum(num) {
      if (currentInput === "0" || isNewCalculation) {
        currentInput = num;
        isNewCalculation = false;
      } else {
        currentInput += num;
      }
      updateScreen(currentInput);
    }

    function appendOp(op) {
      if (isNewCalculation) isNewCalculation = false;
      expression += currentInput + " " + op + " ";
      currentInput = "0";
    }

    function deleteChar() {
      if (isNewCalculation) return;
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = "0";
      }
      updateScreen(currentInput);
    }

    function appendPercent() {
      let val = parseFloat(currentInput);
      if (isNaN(val)) return;
      currentInput = String(val / 100);
      updateScreen(currentInput);
    }

    function clearScreen() {
      currentInput = "0";
      expression = "";
      updateScreen("0");
    }

    function calculate() {
      if (!expression && !currentInput) return;
      let fullExpr = expression + currentInput;
      let evalExpr = fullExpr.replace(/×/g, '*').replace(/÷/g, '/');

      try {
        let result = eval(evalExpr);
        result = Math.round(result * 100000000) / 100000000;
        addHistory(`${fullExpr} = ${result}`);
        currentInput = String(result);
        expression = "";
        isNewCalculation = true;
        updateScreen(currentInput);
      } catch (e) {
        updateScreen("Error");
        currentInput = "0";
        expression = "";
      }
    }

    // 割引機能
    function toggleDiscount() {
      const wrapper = document.getElementById('discountWrapper');
      wrapper.classList.toggle('open');
    }

    function applyDiscount(rate) {
      let val = parseFloat(currentInput);
      if (isNaN(val) || val === 0) return;

      let discounted = val * (1 - rate);
      discounted = Math.round(discounted);
      let percentText = Math.round(rate * 100) + "%OFF";

      addHistory(`${val} の ${percentText} = ${discounted}`);
      currentInput = String(discounted);
      isNewCalculation = true;
      updateScreen(currentInput);
    }

    // メモリー機能
    function memoryClear() { memoryValue = 0; }
    function memoryAdd() { memoryValue += parseFloat(currentInput) || 0; isNewCalculation = true; }
    function memorySub() { memoryValue -= parseFloat(currentInput) || 0; isNewCalculation = true; }
    function memoryRecall() { currentInput = String(memoryValue); updateScreen(currentInput); isNewCalculation = true; }

    // 履歴管理
    function addHistory(item) {
      history.unshift(item);
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<li class="history-item">履歴はありません</li>';
        return;
      }
      list.innerHTML = history.map(h => `<li class="history-item">${h}</li>`).join('');
    }

    function toggleHistory() {
      const modal = document.getElementById('historyModal');
      modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
  </script>
</body>
</html>
